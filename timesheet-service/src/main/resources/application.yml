server:
  port: 8082

spring:
  application:
    name: timesheet-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:consultingops_timesheet}
    username: ${DB_USER:consultingops}
    password: ${DB_PASSWORD:consultingops}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

clients:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8081}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt-secret: ${JWT_SECRET:0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF}
    internal-api-key: ${INTERNAL_API_KEY:consultingops-internal-key}

logging:
  level:
    com.consultingops.timesheetservice: INFO
