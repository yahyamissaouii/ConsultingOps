services:
  user-db:
    image: postgres:16-alpine
    container_name: consultingops-user-db
    environment:
      POSTGRES_DB: ${USER_DB_NAME:-consultingops_user}
      POSTGRES_USER: ${USER_DB_USER:-consultingops}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD:-consultingops}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER:-consultingops} -d ${USER_DB_NAME:-consultingops_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  timesheet-db:
    image: postgres:16-alpine
    container_name: consultingops-timesheet-db
    environment:
      POSTGRES_DB: ${TIMESHEET_DB_NAME:-consultingops_timesheet}
      POSTGRES_USER: ${TIMESHEET_DB_USER:-consultingops}
      POSTGRES_PASSWORD: ${TIMESHEET_DB_PASSWORD:-consultingops}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESHEET_DB_USER:-consultingops} -d ${TIMESHEET_DB_NAME:-consultingops_timesheet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  billing-db:
    image: postgres:16-alpine
    container_name: consultingops-billing-db
    environment:
      POSTGRES_DB: ${BILLING_DB_NAME:-consultingops_billing}
      POSTGRES_USER: ${BILLING_DB_USER:-consultingops}
      POSTGRES_PASSWORD: ${BILLING_DB_PASSWORD:-consultingops}
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BILLING_DB_USER:-consultingops} -d ${BILLING_DB_NAME:-consultingops_billing}"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: consultingops-user-service
    depends_on:
      user-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      DB_HOST: user-db
      DB_PORT: 5432
      DB_NAME: ${USER_DB_NAME:-consultingops_user}
      DB_USER: ${USER_DB_USER:-consultingops}
      DB_PASSWORD: ${USER_DB_PASSWORD:-consultingops}
    ports:
      - "8081:8081"

  timesheet-service:
    build:
      context: .
      dockerfile: timesheet-service/Dockerfile
    container_name: consultingops-timesheet-service
    depends_on:
      timesheet-db:
        condition: service_healthy
      user-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      DB_HOST: timesheet-db
      DB_PORT: 5432
      DB_NAME: ${TIMESHEET_DB_NAME:-consultingops_timesheet}
      DB_USER: ${TIMESHEET_DB_USER:-consultingops}
      DB_PASSWORD: ${TIMESHEET_DB_PASSWORD:-consultingops}
      USER_SERVICE_URL: http://user-service:8081
    ports:
      - "8082:8082"

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    container_name: consultingops-billing-service
    depends_on:
      billing-db:
        condition: service_healthy
      timesheet-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      DB_HOST: billing-db
      DB_PORT: 5432
      DB_NAME: ${BILLING_DB_NAME:-consultingops_billing}
      DB_USER: ${BILLING_DB_USER:-consultingops}
      DB_PASSWORD: ${BILLING_DB_PASSWORD:-consultingops}
      TIMESHEET_SERVICE_URL: http://timesheet-service:8082
    ports:
      - "8083:8083"

  frontend:
    build:
      context: .
      dockerfile: optional-frontend/Dockerfile
    container_name: consultingops-frontend
    depends_on:
      user-service:
        condition: service_started
      timesheet-service:
        condition: service_started
      billing-service:
        condition: service_started
    ports:
      - "3000:80"
