server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:consultingops_user}
    username: ${DB_USER:consultingops}
    password: ${DB_PASSWORD:consultingops}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt-secret: ${JWT_SECRET:0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF}
    internal-api-key: ${INTERNAL_API_KEY:consultingops-internal-key}
  demo-data:
    enabled: true

logging:
  level:
    com.consultingops.userservice: INFO
